<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — TrainWithKen Admin</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
  <style>
    .filter-bar { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .filter-btn { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:8px 18px; background:var(--dark3); border:1px solid rgba(255,255,255,0.08); color:var(--gray); cursor:pointer; transition:all 0.15s; }
    .filter-btn.active, .filter-btn:hover { background:var(--gold); color:var(--black); border-color:var(--gold); }
    .search-input { background:var(--dark3); border:1px solid rgba(255,255,255,0.08); border-bottom:1px solid rgba(201,168,76,0.3); color:var(--white); font-family:'Barlow',sans-serif; font-size:13px; padding:8px 14px; outline:none; width:240px; }
    .search-input::placeholder { color:var(--gray); }
  </style>
</head>
<body>
<button class="sidebar-toggle" id="sidebarToggle"><span></span><span></span><span></span></button>
<div class="dash-wrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-badge">KJ</div>
      <div><div class="sidebar-brand">TRAINWITHKEN</div><div class="sidebar-sub">Admin Panel</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Overview</div>
      <a class="sidebar-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a class="sidebar-link active" href="clients.html"><span class="icon">👥</span> All Clients</a>
      <a class="sidebar-link" href="check-ins.html"><span class="icon">📋</span> Check-Ins</a>
      <a class="sidebar-link" href="revenue.html"><span class="icon">💰</span> Revenue</a>
      <div class="sidebar-section">Site</div>
      <a class="sidebar-link" href="../index.html" target="_blank"><span class="icon">🌐</span> View Site</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><strong>Ken Jones</strong>Admin</div>
      <button class="btn-signout" id="signOutBtn">Sign Out</button>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-header">
      <div><h1>ALL CLIENTS</h1><p id="clientCount">Loading…</p></div>
    </div>
    <div class="dash-body">

      <div class="filter-bar">
        <input class="search-input" type="text" id="searchInput" placeholder="Search by name or email…" />
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="vip">VIP Elite</button>
        <button class="filter-btn" data-filter="online">Online</button>
        <button class="filter-btn" data-filter="self-led">Self-Led</button>
        <button class="filter-btn" data-filter="inactive">Inactive</button>
      </div>

      <div class="panel">
        <div class="panel-body" style="padding:0;">
          <table class="dash-table" id="clientsTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Plan</th>
                <th>Status</th>
                <th>Start Date</th>
                <th>Check-Ins</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="clientsBody">
              <tr><td colspan="7" style="text-align:center;color:var(--gray);padding:40px;">Loading clients…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://rwsmplnbxdcioyklbqes.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3c21wbG5ieGRjaW95a2xicWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjkxMTAsImV4cCI6MjA5NjYwNTExMH0.hsKeMeRcYywoEYOsdUAtqII1Q3ajpVtf6KkJQ_FiZpw');

const planLabels = {'self-led':'Self-Led','online':'Online Coaching','vip':'VIP Elite'};
let allClients = [], checkinCounts = {};
let currentFilter = 'all', currentSearch = '';

function statusBadge(s) {
  if (s === 'active') return '<span class="badge badge-green">Active</span>';
  if (s === 'cancelled') return '<span class="badge badge-red">Cancelled</span>';
  if (s === 'past_due') return '<span class="badge badge-red">Past Due</span>';
  return '<span class="badge badge-gray">Inactive</span>';
}

function planBadge(p) {
  if (p === 'vip') return '<span class="badge badge-gold">VIP Elite</span>';
  if (p === 'online') return '<span class="badge" style="background:rgba(126,184,247,0.1);color:#7eb8f7;border:1px solid rgba(126,184,247,0.3);">Online</span>';
  if (p === 'self-led') return '<span class="badge badge-gray">Self-Led</span>';
  return '<span class="badge badge-gray">—</span>';
}

function renderClients() {
  let filtered = allClients.filter(c => {
    const name = [c.first_name,c.last_name].filter(Boolean).join(' ').toLowerCase();
    const email = (c.email||'').toLowerCase();
    const matchSearch = !currentSearch || name.includes(currentSearch) || email.includes(currentSearch);
    const matchFilter =
      currentFilter === 'all' ||
      (currentFilter === 'active' && c.plan_status === 'active') ||
      (currentFilter === 'inactive' && c.plan_status !== 'active') ||
      c.plan === currentFilter;
    return matchSearch && matchFilter;
  });

  document.getElementById('clientCount').textContent = `${filtered.length} client${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    document.getElementById('clientsBody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--gray);padding:40px;">No clients match this filter.</td></tr>';
    return;
  }

  document.getElementById('clientsBody').innerHTML = filtered.map(c => {
    const name = [c.first_name,c.last_name].filter(Boolean).join(' ') || '—';
    const count = checkinCounts[c.id] || 0;
    const start = c.start_date ? new Date(c.start_date).toLocaleDateString() : '—';
    return `<tr>
      <td><strong>${name}</strong></td>
      <td><a href="mailto:${c.email}" style="color:var(--gold);">${c.email}</a></td>
      <td>${planBadge(c.plan)}</td>
      <td>${statusBadge(c.plan_status)}</td>
      <td>${start}</td>
      <td><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);">${count}</span></td>
      <td><a href="client.html?id=${c.id}" class="btn btn-outline btn-sm">Manage</a></td>
    </tr>`;
  }).join('');
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location = '../auth/login.html'; return; }
  const { data: me } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
  if (me?.role !== 'admin') { window.location = '../client/dashboard.html'; return; }

  const { data: clients } = await sb.from('profiles').select('*').eq('role','client').order('created_at', { ascending: false });
  allClients = clients || [];

  // Get check-in counts
  const { data: checkins } = await sb.from('check_ins').select('client_id');
  if (checkins) {
    checkins.forEach(c => { checkinCounts[c.client_id] = (checkinCounts[c.client_id] || 0) + 1; });
  }

  renderClients();

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderClients();
    });
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.toLowerCase();
    renderClients();
  });
}

document.getElementById('signOutBtn').addEventListener('click', async () => { await sb.auth.signOut(); window.location = '../auth/login.html'; });
document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
init();
</script>
</body>
</html>
